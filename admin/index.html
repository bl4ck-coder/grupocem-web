<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin — GrupoCEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login">
  <main class="login-card">
    <h1 class="login-title">GrupoCEM</h1>
    <p class="login-subtitle">Panel de administración</p>
    <form id="login-form" class="login-form" autocomplete="off">
      <label for="password" class="visually-hidden">Contraseña</label>
      <input id="password" name="password" type="password" placeholder="Contraseña" required autofocus>
      <button type="submit">Ingresar</button>
      <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
    </form>
  </main>
  <script src="js/login.js" defer></script>
</body>
</html>
